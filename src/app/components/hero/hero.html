<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>
  <div class="hero-content">
    <div class="hero-tag">Furgonetas de Ocasión Premium</div>
    <h1>No vendemos furgonetas.<br><em>Impulsamos tu negocio.</em></h1>
    <p>Vehículos revisados, certificados y listos para trabajar. La confianza que tu negocio necesita.</p>
    <div class="hero-cta">
      <button class="btn-hero btn-hero-primary" routerLink="/show-catalogo">🔍 Explorar catálogo</button>
      <button class="btn-hero btn-hero-secondary">🚐 Vender mi furgoneta</button>
    </div>
  </div>
  <!-- Van placeholder -->
  <div class="hero-van">
    <img src="/images/hero_image.png" alt="Furgoneta FlexemCar" />
  </div>
  <div class="scroll-indicator">
    <button class="scroll-dot" (click)="scrollToStats()" aria-label="Scroll to stats">↓</button>
  </div>
</section>
