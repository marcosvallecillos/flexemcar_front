<div class="admin-shell">
  <!-- SIDEBAR -->
  <aside class="sidebar" [class.collapsed]="!sidebarOpen"
         (mouseenter)="sidebarOpen = true"
         (mouseleave)="sidebarOpen = false">
    <div class="brand">
      <div class="brand-logo">A</div>
      <span class="brand-text" [class.hidden]="!sidebarOpen">ADMIN PANEL</span>
    </div>

    <nav class="nav">
      <a class="nav-item" routerLink="/admin/dashboard" routerLinkActive="active"
         [title]="!sidebarOpen ? 'Dashboard' : ''">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M2 10a8 8 0 118 8A8 8 0 012 10zm8-6a1 1 0 00-1 1v5a1 1 0 001 1h4a1 1 0 000-2h-3V5a1 1 0 00-1-1z"/></svg>
        <span class="nav-label" [class.hidden]="!sidebarOpen">{{ getText('Dashboard', 'Dashboard') }}</span>
      </a>
      <a class="nav-item" routerLink="/admin/users" routerLinkActive="active"
         [title]="!sidebarOpen ? 'Usuarios' : ''">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/></svg>
        <span class="nav-label" [class.hidden]="!sidebarOpen">{{ getText('Usuarios', 'Users') }}</span>
      </a>
      <a class="nav-item" routerLink="/admin/reservations" routerLinkActive="active"
         [title]="!sidebarOpen ? 'Reservas' : ''">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/></svg>
        <span class="nav-label" [class.hidden]="!sidebarOpen">{{ getText('Reservas', 'Reservations') }}</span>
      </a>
      <a class="nav-item" routerLink="/admin/reservasAnuladas" routerLinkActive="active"
         [title]="!sidebarOpen ? 'Reservas Anuladas' : ''">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/></svg>
        <span class="nav-label" [class.hidden]="!sidebarOpen">{{ getText('Reservas Anuladas', 'Reservations') }}</span>
      </a>
      <a class="nav-item" routerLink="/admin/catalogo" routerLinkActive="active"
         [title]="!sidebarOpen ? 'Vehículos' : ''">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M8 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM15 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z"/><path d="M3 4h14l1.5 6H1.5L3 4zM1 11h18v2H1z"/></svg>
        <span class="nav-label" [class.hidden]="!sidebarOpen">{{ getText('Vehículos', 'Vehicles') }}</span>
      </a>
      <a class="nav-item" routerLink="/admin/settings" routerLinkActive="active"
         [title]="!sidebarOpen ? 'Configuración' : ''">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
        <span class="nav-label" [class.hidden]="!sidebarOpen">{{ getText('Configuración', 'Settings') }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="admin-user">
        <div class="admin-avatar">A</div>
        <div class="admin-info" [class.hidden]="!sidebarOpen">
          <span class="admin-name">Admin</span>
          <span class="admin-dot"></span>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()" [title]="!sidebarOpen ? 'Logout' : ''">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/></svg>
        <span class="nav-label" [class.hidden]="!sidebarOpen">{{ getText('Cerrar sesión', 'Logout') }}</span>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <router-outlet></router-outlet>
  </main>
</div>
