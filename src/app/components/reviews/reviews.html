<section class="reviews-section fade-in-up">
  <div style="max-width:100%">
    <div class="section-tag">Testimonios</div>
    <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-top:8px;margin-bottom:0">
      <h2 style="font-size:clamp(1.8rem,3vw,2.6rem);font-weight:800">Lo que dicen<br><em style="color:var(--orange-light);font-style:normal">nuestros clientes</em></h2>
      <div style="display:flex;align-items:center;gap:16px;padding-bottom:4px">
        <div style="font-family:'Syne',sans-serif;font-size:2.5rem;font-weight:800">4.2</div>
        <div>
          <div style="color:#FBBF24;font-size:1.1rem">★★★★★</div>
          <div style="color:var(--muted);font-size:.78rem">+56 reseñas en Google</div>
        </div>
      </div>
    </div>
  </div>
  <div class="reviews-grid">
    @for (review of reviews; track review.id) {
      <div class="review-card" [class.featured]="review.featured">
        <div class="review-stars">{{ getStars(review.stars) }}</div>
        <p class="review-text">{{ review.text }}</p>
        <div class="reviewer">
          <div class="reviewer-avatar">{{ review.reviewerInitials }}</div>
          <div>
            <div class="reviewer-name">{{ review.reviewerName }}</div>
            <div class="reviewer-company">{{ review.reviewerCompany }}</div>
          </div>
        </div>
      </div>
    }
  </div>
</section>
